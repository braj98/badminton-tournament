<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager - Champion Screen</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            
            /* Podium Colors */
            --gold: #eab308;
            --gold-light: #fef9c3;
            --silver: #94a3b8;
            --silver-light: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        /* Top Header Navigation Panel */
        .app-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand h1 {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.15rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-header {
            background-color: var(--bg-page);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-header.accent {
            background-color: var(--primary-light);
            color: var(--primary);
            border-color: transparent;
        }

        /* Main Workspace Content Framework */
        .main-container {
            max-width: 840px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Breadcrumbs styling */
        .breadcrumbs-path {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            display: flex;
            gap: 0.35rem;
        }

        .breadcrumbs-path span {
            color: var(--text-main);
            font-weight: 500;
        }

        /* Category Selector Tab Slider Bar */
        .category-tab-row {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .tab-pill-btn {
            background: none;
            border: 1px solid transparent;
            padding: 0.5rem 1.1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .tab-pill-btn::before {
            content: "●";
            font-size: 0.65rem;
            color: #cbd5e1;
        }

        .tab-pill-btn.active-pill {
            background-color: #0f172a;
            color: #ffffff;
            font-weight: 600;
        }

        .tab-pill-btn.active-pill::before {
            color: #38bdf8;
        }

        /* Secondary Stage Filtering Layout Subnavigation Track view controls */
        .stage-sub-navbar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .stage-nav-item {
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            position: relative;
        }

        .stage-nav-item.active-stage {
            color: var(--primary);
            font-weight: 700;
        }

        .stage-nav-item.active-stage::after {
            content: "";
            position: absolute;
            bottom: -0.75rem;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--primary);
        }

        /* Podiums & Celebration Workspace Matrix view layout panels */
        .celebration-podium-stack {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .podium-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Champion Distinct Profile Card Elements */
        .podium-card.champion-tier {
            border: 2px solid var(--gold);
            background: linear-gradient(180deg, #ffffff 0%, #fffdf5 100%);
        }

        .podium-card.runner-up-tier {
            border: 1px solid var(--border);
            background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
            padding: 2rem;
        }

        .tier-badge-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .champion-tier .tier-badge-label { color: var(--gold); }
        .runner-up-tier .tier-badge-label { color: var(--silver); }

        .big-emblem-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
            line-height: 1;
        }

        .winner-title-string {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        .runner-up-tier .winner-title-string {
            font-size: 1.35rem;
            color: var(--text-main);
            margin-bottom: 1.25rem;
        }

        /* Modern Image Dropzone Input Components mapping placeholder fields layout template */
        .photo-uploader-dropzone {
            max-width: 240px;
            height: 160px;
            margin: 0 auto;
            border: 2px dashed #cbd5e1;
            background-color: var(--bg-page);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .photo-uploader-dropzone:hover {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }

        .dropzone-icon {
            font-size: 1.25rem;
            color: var(--text-muted);
        }

        .dropzone-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .photo-uploader-dropzone:hover .dropzone-icon,
        .photo-uploader-dropzone:hover .dropzone-text {
            color: var(--primary);
        }

        /* App Context Page Bottom Sticky Mode Controls Strip info */
        .mode-footer-info {
            text-align: center;
            margin-top: 4rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <!-- Header Grid Area Controls Module component -->
    <header class="app-header">
        <div class="brand">
            <h1>🏆 Tournament Manager</h1>
            <p>Bren Avalon Sports Meet 2026</p>
        </div>
        <div class="header-actions">
            <button class="btn-header accent" onclick="alert('Opening Global Results Dashboard Feed Summary...')">📊 Results Feed</button>
            <button class="btn-header" onclick="alert('Switching Context Profile Mode Framework...')">👁️ Viewer Mode</button>
        </div>
    </header>

    <div class="main-container">
        
        <!-- Breadcrumbs Navigation History Tracker Stack Mapping context sets -->
        <div class="breadcrumbs-path">
            Home &gt; Bren Avalon Sports Meet 2026 &gt; Badminton &gt; <span>Sr Dbls</span>
        </div>

        <!-- Horizontal Scroll Category Tab Strip Panel mapping framework arrays -->
        <nav class="category-tab-row" id="tabSliderRow">
            <button class="tab-pill-btn">Junior</button>
            <button class="tab-pill-btn">Jr Dbls</button>
            <button class="tab-pill-btn">Sr Boys</button>
            <button class="tab-pill-btn">Sr Girls</button>
            <button class="tab-pill-btn active-pill">Sr Dbls</button>
            <button class="tab-pill-btn">Adult Dbls</button>
            <button class="tab-pill-btn">Adults single</button>
        </nav>

        <!-- Secondary Workflow Context Filter Menu Line Layout view maps -->
        <nav class="stage-sub-navbar" id="stageNavbar">
            <div class="stage-nav-item">Groups</div>
            <div class="stage-nav-item">Fixtures</div>
