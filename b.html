<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager - Report Hub</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --text-main: #0f172a;
            --text-muted: #475569;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);

            /* Selected Electric Amber Track Palette Variables */
            --amber-bg: #fffbeb;
            --amber-border: #fcd34d;
            --amber-text: #78350f;
            --amber-meta: #b45309;
            --amber-icon: #d97706;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            padding-bottom: 5rem;
        }

        /* MASTER UNIFIED APP HEADER */
        .unified-app-bar {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.65rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand-cluster {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand-meta h1 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-meta p {
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-view-pill {
            background-color: #f1f5f9;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.45rem 0.85rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .admin-profile-trigger {
            background-color: #0f172a;
            color: #ffffff;
            border: none;
            padding: 0.45rem 0.85rem;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* LOCKED-IN SELECTED ELECTRIC AMBER TICKER TRACK */
        .amber-ticker-strip {
            background-color: var(--amber-bg);
            border-bottom: 1px solid var(--amber-border);
            padding: 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .amber-ticker-strip .icon { color: var(--amber-icon); font-size: 0.9rem; }
        .amber-ticker-strip .meta { color: var(--amber-meta); text-transform: uppercase; font-weight: 700; letter-spacing: 0.03em; }
        .amber-ticker-strip .names { color: var(--amber-text); font-weight: 700; }

        /* Workspace Main Frame */
        .workspace-frame {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .breadcrumb-trail {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .breadcrumb-trail span {
            color: var(--text-main);
            font-weight: 600;
        }

        /* PROFESSIONAL BALANCED ACTION TOOLBAR PANEL */
        .action-toolbar-panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between; /* Creates an intuitive visual split */
            flex-wrap: wrap;
            gap: 1rem;
        }

        /* Left Side Cluster: Active Document Creation Controls */
        .toolbar-primary-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Right Side Cluster: Utilities & Destruction Controls */
        .toolbar-utility-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* CORE COMPONENT SPECIFIC BUTTON STYLING MATRICES */
        .btn-core {
            border: 1px solid transparent;
            padding: 0.55rem 1.15rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.15s ease-in-out;
            white-space: nowrap;
        }

        /* Hierarchy 1: Primary Action (Publish Report) */
        .btn-core.action-publish {
            background-color: var(--primary);
            color: #ffffff;
        }
        .btn-core.action-publish:hover {
            background-color: var(--primary-hover);
        }

        /* Hierarchy 2: Secondary Action (Save Draft) */
        .btn-core.action-save {
            background-color: var(--primary-light);
            color: var(--primary);
        }
        .btn-core.action-save:hover {
            background-color: #dbeafe;
        }

        /* Hierarchy 3: Utilities Outline Styles (Regenerate, Print, Back) */
        .btn-core.action-utility {
            background-color: #ffffff;
            border-color: var(--border);
            color: var(--text-muted);
        }
        .btn-core.action-utility:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
            border-color: #cbd5e1;
        }

        /* Hierarchy 4: Destructive Action isolated layout (Delete Draft) */
        .btn-core.action-delete {
            background-color: transparent;
            color: var(--text-muted);
        }
        .btn-core.action-delete:hover {
            background-color: var(--danger-light);
            color: var(--danger);
        }

        /* RESPONSIVE LAYOUT CONSTRAINTS FOR MOBILE DEVICE VIEWPORTS */
        @media (max-width: 640px) {
            .action-toolbar-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar-primary-group, .toolbar-utility-group {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-core {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Unified Master Application Header Row -->
    <header class="unified-app-bar">
        <div class="header-brand-cluster">
            <div class="brand-meta">
                <h1>🏆 Tournament</h1>
                <p>Bren Avalon Sports Meet 2026</p>
            </div>
        </div>
        <div><button class="btn-view-pill">📊 Results</button></div>
        <div><button class="admin-profile-trigger">⚙️ Admin</button></div>
    </header>

    <!-- Hardcoded Selected Amber Ticker Strip -->
    <div class="amber-ticker-strip">
        <span class="icon">🏸</span>
        <span class="meta">Adults single • 📅</span>
        <span class="names">Deepak vs Archit</span>
    </div>

    <div class="workspace-frame">
        
        <!-- Breadcrumb Tracker elements maps -->
        <div class="breadcrumb-trail">
            Home &gt; Bren Avalon Sports Meet 2026 &gt; <span>Report Workspace</span>
        </div>

        <!-- RE-ENGINEERED PROFESSIONAL ACTION TOOLBAR BAR -->
        <div class="action-toolbar-panel">
            
            <!-- Left aligned: Document Creation Actions -->
            <div class="toolbar-primary-group">
                <button class="btn-core action-publish" onclick="alert('Publishing compiled event dashboard records report...')">📢 Publish Report</button>
                <button class="btn-core action-save" onclick="alert('Saving modified variables drafts context datasets...')">💾 Save Draft</button>
            </div>

            <!-- Right aligned: Utility Configurations & Destructive nodes -->
            <div class="toolbar-utility-group">
                <button class="btn-core action-utility" onclick="alert('Regenerating report content logs...')">🔄 Regenerate</button>
                <button class="btn-core action-utility" onclick="alert('Triggering printing utility...')">🖨️ Print</button>
                <button class="btn-core action-utility" onclick="alert('Returning to previous display map...')">← Back</button>
                <button class="btn-core action-delete" onclick="alert('Warning: Terminating draft session logs...')">🗑️ Delete Draft</button>
            </div>

        </div>

    </div>

</body>
</html>
